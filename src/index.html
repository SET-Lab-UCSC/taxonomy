<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxonomy of XR Interactions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Archivo+Black&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/home.css">
</head>

<body>
    <header class="header">
        <h1 class="site-title font-display gradient-text">
            Taxonomy of XR Interactions
        </h1>
        <div class="header-buttons">
            <button class="btn btn-outline">
                <b>Submit an observation</b>
            </button>
            <button class="btn btn-primary">
                <b> About </b>
            </button>
        </div>
    </header>

    <nav class="sub-nav">
        <div class="sub-nav-links">
            <a href="./explore.html" class="sub-nav-link">
                Explore Observations ›
            </a>
            <a href="./applications.html" class="sub-nav-link">
                Applications >
            </a>
            <a href="./tasks.html" class="sub-nav-link">
                Tasks ›
            </a>
            <a href="./inputs.html" class="sub-nav-link">
                Inputs ›
            </a>
            <a href="./interface-elements.html" class="sub-nav-link">
                Interface Elements ›
            </a>
            <a href="./feedback.html" class="sub-nav-link">
                Feedback ›
            </a>
            <a href="./Interaction-techniques.html" class="sub-nav-link">
                Interaction Techniques ›
            </a>
        </div>
    </nav>

    <main class="home-main">
        <div class="home-content">
            <section class="dashboard-section">
                <h2 class="section-title">Taxonomy Coverage</h2>
                <div class="metrics-container">
                    <div id="applications-metric"></div>
                    <div id="techniques-metric"></div>
                    <div id="observations-metric"></div>
                    <div id="tasks-metric"></div>
                    <div id="inputs-metric"></div>
                    <div id="interface-elements-metric"></div>
                    <div id="feedback-metric"></div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { loadDashboardData } from './dashboardData.js';
        import { renderDashboard, destroyCharts } from './dashboardVisualization.js';

        async function initDashboard() {
            try {
                const data = await loadDashboardData();

                if (data.error) {
                    console.error('Dashboard error:', data.error);
                    document.querySelector('.home-content').innerHTML = `
                        <div style="color: #dc2626; padding: 2rem; text-align: center;">
                            <p>Error loading data. Check console for details.</p>
                        </div>
                    `;
                    return;
                }

                renderDashboard(data);
                console.log('✓ Dashboard initialized');
            } catch (error) {
                console.error('Dashboard init error:', error);
            }
        }

        initDashboard();

        // Cleanup on page unload
        window.addEventListener('unload', destroyCharts);
    </script>
</body>

</html>
